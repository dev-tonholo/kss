name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Amper
        uses: actions/cache@v4
        with:
          path: .amper/
          key: amper-${{ runner.os }}-${{ hashFiles('amper') }}

      - name: Build
        run: ./amper build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Amper
        uses: actions/cache@v4
        with:
          path: .amper/
          key: amper-${{ runner.os }}-${{ hashFiles('amper') }}

      - name: Test
        run: ./amper test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache lint tools
        uses: actions/cache@v4
        with:
          path: .cache/
          key: lint-${{ runner.os }}-ktlint1.8.0-detekt2.0.0a2-compose0.5.6

      - name: Run ktlint and detekt
        run: ./scripts/check.sh
