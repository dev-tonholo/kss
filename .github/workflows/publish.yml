name: Publish

on:
  push:
    tags:
      - '[0-9]*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Amper
        uses: actions/cache@v4
        with:
          path: .amper/
          key: amper-${{ runner.os }}-${{ hashFiles('amper') }}

      - name: Build
        run: ./amper build

      - name: Test
        run: ./amper test

  publish-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            publishing/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('publishing/gradle/wrapper/gradle-wrapper.properties', 'publishing/**/*.gradle.kts') }}

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        working-directory: publishing
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.GPG_PASSPHRASE }}

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            publishing/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('publishing/gradle/wrapper/gradle-wrapper.properties', 'publishing/**/*.gradle.kts') }}

      - name: Publish to GitHub Packages
        working-directory: publishing
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
