name: Setup Amper
description: Set up JDK, cache Amper distribution, and create local.properties stub for CI builds.

inputs:
  java-version:
    description: JDK version to install
    required: false
    default: '17'

runs:
  using: composite
  steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          .amper/
          build/
          ~/.konan/
          ~/.cache/
        key: amper-${{ runner.os }}-${{ hashFiles('amper', '**/module.yaml', 'kss.module-template.yaml') }}
        restore-keys: |
          amper-${{ runner.os }}-

    - name: Create local.properties
      shell: bash
      run: |
        cat <<'PROPS' > local.properties
        sonatype.username=unused
        sonatype.password=unused
        github.username=unused
        github.token=unused
        PROPS
