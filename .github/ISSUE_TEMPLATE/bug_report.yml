name: Bug Report
description: Report a bug in KSS
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: css-input
    attributes:
      label: CSS Input
      description: The CSS source that triggers the bug (if applicable).
      render: css

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or stack traces if available.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Call `CssTokenizer().tokenize("...")`
        2. ...

  - type: input
    id: version
    attributes:
      label: KSS Version
      placeholder: e.g. 0.1.0 or commit SHA

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - JVM
        - iOS
        - macOS
        - Linux
        - JS
        - wasmJs
        - All
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. JDK 17, macOS 15, Kotlin 2.3
