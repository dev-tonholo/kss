<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSS — CSS AST Explorer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            visibility: hidden;
        }
        #loading-container {
            visibility: visible;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            z-index: 9999;
        }
        #loading-container p {
            margin-top: 16px;
            color: #858585;
            font-family: system-ui, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="loading-container">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
        <circle cx="25" cy="25" r="20" stroke="#3e3e42" stroke-width="4" fill="none"/>
        <circle cx="25" cy="25" r="20" stroke="#569cd6" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="90 125">
            <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                              repeatCount="indefinite"/>
        </circle>
    </svg>
    <p>Loading KSS Explorer...</p>
</div>
<script type="module">
    import { _initialize } from './web.mjs';
    await _initialize();
    document.getElementById('loading-container')?.remove();
    document.body.style.visibility = 'visible';
</script>
</body>
</html>
